name: 'Setup, Restore, and Build Solution'
description: 'Checks out code, sets up .NET, restores NuGet packages, and builds the solution for CI jobs.'
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: ./global.json

    - name: Restore local .NET tools
      shell: pwsh
      run: |
        $maxAttempts = 3
        for ($i = 1; $i -le $maxAttempts; $i++) {
          Write-Host "Attempt $i of ${maxAttempts}: dotnet tool restore"
          dotnet tool restore
          if ($LASTEXITCODE -eq 0) { break }
          if ($i -eq $maxAttempts) {
            Write-Error "dotnet tool restore failed after $maxAttempts attempts"
            exit 1
          }
          Start-Sleep -Seconds (5 * $i)
        }

    - name: NuGet Restore
      shell: pwsh
      run: dotnet restore /p:ContinuousIntegrationBuild=true

    - name: Build
      shell: pwsh
      run: dotnet build --no-restore --configuration Release /p:Deterministic=true /p:ContinuousIntegrationBuild=true /p:UseSharedCompilation=false /p:BuildInParallel=false /nodeReuse:false /bl:./artifacts/logs/release/build.release.binlog

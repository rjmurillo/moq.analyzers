name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: 'New Analyzers & Code Fixes'
    labels:
      - 'analyzers'
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
      - 'bugfix'
  - title: 'Build & CI'
    labels:
      - 'build'
      - 'github_actions'
  - title: 'Dependencies'
    labels:
      - 'dependencies'
  - title: 'Documentation'
    labels:
      - 'documentation'
  - title: 'Other Changes'
    labels:
      - '*'
exclude-labels:
  - 'skip-changelog'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
      - 'analyzers'
  patch:
    labels:
      - 'bug'
      - 'bugfix'
      - 'dependencies'
      - 'build'
  default: patch
autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: 'bug'
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?!?:/'
  - label: 'build'
    title:
      - '/^build(\(.+\))?!?:/'
      - '/^ci(\(.+\))?!?:/'
  - label: 'breaking'
    title:
      - '/^.+!:/'

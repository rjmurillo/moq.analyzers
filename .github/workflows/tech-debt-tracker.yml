name: Tech debt tracker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  scan-todo:
    name: Scan TODO/FIXME markers
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Scan for unlinked tech debt markers
        shell: pwsh
        run: ./build/scripts/todo-scanner/Scan-TodoComments.ps1 -FailOnUnlinked

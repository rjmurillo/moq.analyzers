name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build:
    name: Lint
    # super-linter requires x86_64; ARM64 is not supported upstream
    # https://github.com/super-linter/super-linter/issues/5070
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          LINTER_RULES_PATH: "."
          MARKDOWN_CONFIG_FILE: ".markdownlint.json"
          YAML_CONFIG_FILE: ".yamllint.yml"
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_JSON: true
          VALIDATE_BASH: true
          FILTER_REGEX_EXCLUDE: '(\.verified\.(txt|xml|json)$|AnalyzerReleases\.(Shipped|Unshipped)\.md$|/\.cursor/|/\.github/chatmodes/|/\.windsurf/|/\.agents/)'

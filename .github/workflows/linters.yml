name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build:
    name: Lint
    # super-linter requires x86_64; ARM64 is not supported upstream
    # https://github.com/super-linter/super-linter/issues/5070
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # To report GitHub Actions status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          LINTER_RULES_PATH: "."
          MARKDOWN_CONFIG_FILE: ".markdownlint.json"
          YAML_CONFIG_FILE: ".yamllint.yml"
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_JSON: true
          VALIDATE_BASH: true
          FILTER_REGEX_EXCLUDE: '(\.verified\.(txt|xml|json)$|AnalyzerReleases\.(Shipped|Unshipped)\.md$|/\.agents/)'

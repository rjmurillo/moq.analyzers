name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0'

permissions: {}

jobs:
  stryker:
    name: Stryker.NET
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: ./global.json

      - name: Restore local .NET tools
        run: dotnet tool restore

      - name: Run mutation smoke test
        working-directory: build/stryker
        run: dotnet stryker --output ../../artifacts/stryker/no-mock-of-logger

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-mutation-reports
          path: artifacts/stryker/**/reports/**
          if-no-files-found: warn

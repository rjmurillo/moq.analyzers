name: Milestone tracking
# SECURITY: This workflow uses pull_request_target, so it runs in the BASE repo
# context with access to secrets even for fork PRs. Invariants (do not break):
#   1. NEVER check out or execute PR-head code (no actions/checkout of
#      github.event.pull_request.head.*, no building/running PR content).
#   2. NEVER interpolate untrusted PR fields (title, body, branch name) directly
#      into run: blocks - pass them through env: instead.
# See: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
on:
  pull_request_target:
    types: [closed]
permissions:
  issues: write
  pull-requests: write
jobs:
  add_milestone:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.repository == 'rjmurillo/moq.analyzers' && github.event.pull_request.merged_at != null && github.event.pull_request.milestone == null && github.event.pull_request.base.ref == 'main' }}
    steps:
      - name: Get milestone data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACTIONS_PR_WRITE }}
          ORGANIZATION: rjmurillo
          REPOSITORY: moq.analyzers
          MILESTONE_NAME: vNext
        run: |
          # shellcheck disable=SC2016
          gh api graphql -f query='
            query($org: String!, $repo: String!, $milestone: String!) {
              repository(name: $repo, owner: $org) {
                milestones(query: $milestone, first: 2) {
                  nodes {
                    id
                    title
                  }
                }
              }
            }' -f org="$ORGANIZATION" -f repo="$REPOSITORY" -f milestone="$MILESTONE_NAME" > milestone_data.json

          MILESTONE_ID=$(jq -r 'if (((.data.repository.milestones.nodes | length) == 1) and .data.repository.milestones.nodes[0].title == $MILESTONE_NAME) then .data.repository.milestones.nodes[0].id else "" end' --arg MILESTONE_NAME "$MILESTONE_NAME" milestone_data.json)
          echo "MILESTONE_ID=$MILESTONE_ID" >> "$GITHUB_ENV"

      - name: Assign milestone
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACTIONS_PR_WRITE }}
          PULL_REQUEST_ID: ${{ github.event.pull_request.node_id }}
        if: ${{ env.MILESTONE_ID != '' }}
        run: |
          # shellcheck disable=SC2016
          gh api graphql -f query='
            mutation($pull: ID!, $milestone: ID!) {
              updatePullRequest(input: {pullRequestId: $pull, milestoneId: $milestone}) {
                pullRequest {
                  id
                  number
                  milestone {
                    id
                    number
                    title
                  }
                }
              }
            }' -f pull="$PULL_REQUEST_ID" -f milestone="$MILESTONE_ID"

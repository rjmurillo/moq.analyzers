name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  update_release_draft:
    name: Draft release notes
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@9d3c5c5d6fa493b7e5a45fc3e39fb8bcbac2b297 # v6.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  label_pull_request:
    name: Label pull request
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@9d3c5c5d6fa493b7e5a45fc3e39fb8bcbac2b297 # v6.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

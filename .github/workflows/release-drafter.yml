name: Release Drafter

# SECURITY: This workflow uses pull_request_target, so it runs in the BASE repo
# context with access to secrets even for fork PRs. Invariants (do not break):
#   1. NEVER check out or execute PR-head code (no actions/checkout of
#      github.event.pull_request.head.*, no building/running PR content).
#   2. NEVER interpolate untrusted PR fields (title, body, branch name) directly
#      into run: blocks - pass them through env: instead.
# See: https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  update_release_draft:
    name: Draft release notes
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  label_pull_request:
    name: Label pull request
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply release-drafter labels
        uses: release-drafter/release-drafter/autolabeler@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
